name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: claude_code_treasure_game-initial/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: claude_code_treasure_game-initial

      - name: Build
        run: npm run build
        working-directory: claude_code_treasure_game-initial

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: claude_code_treasure_game-initial/build

      - uses: actions/deploy-pages@v4
        id: deployment
